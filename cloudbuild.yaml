steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '$_IMAGE_NAME'
      - '.'
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '$_IMAGE_NAME'
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE_NAME'
      - '--image=$_IMAGE_NAME'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--set-env-vars=GMAIL_USER_EMAIL=$_GMAIL_USER_EMAIL,EMBEDDING_MODEL=models/embedding-001'

images:
  - '$_IMAGE_NAME'

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _SERVICE_NAME: gmail-intelligence-tool
  _REGION: europe-west1
  _IMAGE_NAME: gcr.io/$PROJECT_ID/gmail-intelligence-tool
  _GMAIL_USER_EMAIL: ''
